; PlatformIO Project Configuration File

[env:m5stick-c]
platform = espressif32
board = m5stick-c
framework = arduino
lib_deps =
    m5stack/M5StickCPlus2@^1.0.2
    links2004/WebSockets@^2.4.0
    t-vk/ESP32 BLE Keyboard@^0.3.2
    h2zero/NimBLE-Arduino@1.4.2
    Arduino-IRremote/IRremote@^4.4.0
lib_ignore = DFRobot_GP8XXX
build_flags = -DUSE_NIMBLE
board_upload.flash_size = 8MB
board_build.partitions = partitions_8mb.csv
upload_port = /dev/cu.usbserial-5B1E0467791
monitor_port = /dev/cu.usbserial-5B1E0467791
monitor_speed = 115200
